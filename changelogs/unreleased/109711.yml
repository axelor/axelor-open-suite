---
title: "MRP: include planned maintenance orders in MRP calculation."
module: axelor-maintenance
developer: |
  Add MrpServiceMaintenanceImpl that overrides MrpServiceProductionImpl to
  generate MRP need lines from planned StockMoveLine entries on maintenance
  manufacturing orders (typeSelect = TYPE_MAINTENANCE).
  A new MrpLineType element value ELEMENT_MAINTENANCE_ORDER_NEED = 13 is
  introduced and seeded as "NMTO - Need / Maintenance order" when the
  maintenance app is enabled. Only products matching the MRP filter scope
  (productSet / productCategorySet / productFamilySet / saleOrderLineSet /
  mrpForecastSet) generate need lines; BOM-exploded sub-components are
  intentionally ignored.
