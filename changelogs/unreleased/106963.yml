---
title: "Analytic: filtered the analytic distribution templates by analytic rules, excluding templates that use an analytic account not authorized for the context company and accounting account."
module: axelor-account
developer: |
  `AnalyticAttrsServiceImpl` constructor now takes an `AccountService` parameter.
  `AnalyticAttrsServiceImpl#getAnalyticDistributionTemplateDomain` now excludes any template
  whose distribution lines reference an analytic account not authorized by the analytic rules
  of the given accounting account (a template is kept only when all of its analytic accounts
  are authorized). No restriction is applied when the account is null or has no matching rule.

  Callers now pass the context accounting account:
  - `InvoiceLineController#setDomainAnalyticDistributionTemplate` passes the invoice line account.
  - `SaleOrderLineController` and `PurchaseOrderLineController` derive the account from the product
    via `AccountManagementAccountService#getProductAccount`.
  - `ContractLineController#setDomainAnalyticDistributionTemplate` (new method) derives the account
    from the product and is wired through the new
    `action-contract-line-method-set-domain-analytic-distribution-template` action.